<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Participar | Amelias em Tech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <section class="py-20 max-w-xl mx-auto px-4">
    <h1 class="font-heading text-4xl text-center mb-10">Vem ser uma Amelia!</h1>
    <form class="bg-white p-10 rounded-[2rem] shadow-xl space-y-6">
      <div>
        <label class="font-heading text-xs block mb-2">Nome Completo</label>
        <input type="text" class="w-full p-4 rounded-xl border-2 border-bege outline-none focus:border-roxo">
      </div>
      <div>
        <label class="font-heading text-xs block mb-2">Idade</label>
        <input type="number" class="w-full p-4 rounded-xl border-2 border-bege outline-none focus:border-roxo">
      </div>
      <button class="btn btn-rosa w-full font-heading">Enviar Inscrição</button>
    </form>
  </section>
</body>
</html>
